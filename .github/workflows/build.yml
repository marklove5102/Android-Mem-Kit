name: Android NDK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false  # We'll clone deps manually
        
    - name: Setup dependencies
      run: |
        git clone --depth 1 https://github.com/hexhacking/xdl.git deps/xdl
        git clone --depth 1 https://github.com/bytedance/android-inline-hook.git deps/shadowhook
        
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25b
        add-to-path: true
        
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DUSE_LOCAL_DEPS=ON \
          -DBUILD_EXAMPLES=OFF
          
    - name: Build
      run: |
        cd build
        cmake --build . --verbose
        
    - name: Verify build artifacts
      run: |
        ls -la build/lib/
        file build/lib/*.so 2>/dev/null || echo "No .so files found"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libmemkit
        path: build/lib/*.so
        retention-days: 7
